name: Deploy till GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Hämta kod
        uses: actions/checkout@v4

      - name: Konfigurera Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Installera beroenden
        run: npm ci

      - name: Bygg applikationen
        run: npm run build

      - name: Kopiera CNAME till dist
        run: cp CNAME dist/CNAME

      - name: Konfigurera GitHub Pages
        uses: actions/configure-pages@v4

      - name: Ladda upp build-artefakt
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Publicera till GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
